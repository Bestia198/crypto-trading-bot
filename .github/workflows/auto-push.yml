name: Auto Push to GitHub

on:
  push:
    branches:
      - main
  schedule:
    # Run every 6 hours to sync any changes
    - cron: '0 */6 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Sync with main branch
        run: |
          git fetch origin
          git pull origin main --rebase || true
          git push origin main || true

      - name: Create Release Notes
        if: github.event_name == 'push'
        run: |
          echo "## Latest Update" > CHANGELOG_LATEST.md
          echo "" >> CHANGELOG_LATEST.md
          echo "**Commit:** $(git rev-parse --short HEAD)" >> CHANGELOG_LATEST.md
          echo "**Author:** $(git log -1 --pretty=format:'%an')" >> CHANGELOG_LATEST.md
          echo "**Date:** $(git log -1 --pretty=format:'%ad')" >> CHANGELOG_LATEST.md
          echo "**Message:** $(git log -1 --pretty=format:'%B')" >> CHANGELOG_LATEST.md
          git add CHANGELOG_LATEST.md
          git commit -m "docs: update changelog" || true
          git push origin main || true

      - name: Notify on Success
        if: success()
        run: |
          echo "✅ Repository synced successfully"
          echo "Latest commit: $(git log -1 --oneline)"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Sync failed"
          exit 1
